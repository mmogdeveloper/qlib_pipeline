# 模型配置
model:
  # 默认模型
  default: "lgbm"

  # 预测目标
  label:
    # 未来5日持有收益: T+1开盘买入, T+6收盘卖出
    # Ref($open, -1) = T+1开盘(买入价, 与 backtest deal_price="open" 一致)
    # Ref($close, -6) = T+6收盘(卖出价)
    # 重要: backtest 中 signal 必须滞后1天(shift), 确保 T 日信号在 T+1 才使用
    expression: "Ref($close, -6)/Ref($open, -1) - 1"
    description: "未来5日收益率（T+1开盘买入 T+6收盘卖出, 与deal_price=open对齐）"
    name: "Ref($close, -6)/Ref($open, -1) - 1"

  # LightGBM 模型
  lgbm:
    class: "LGBModel"
    module_path: "qlib.contrib.model.gbdt"
    kwargs:
      loss: "mse"
      colsample_bytree: 0.8879
      learning_rate: 0.0421
      subsample: 0.8789
      lambda_l1: 205.6999
      lambda_l2: 580.9768
      max_depth: 8
      num_leaves: 210
      num_threads: 4
      n_estimators: 1000
      early_stopping_rounds: 50
      verbose: -1

  # Ridge回归模型
  linear:
    class: "LinearModel"
    module_path: "qlib.contrib.model.linear"
    kwargs:
      estimator: "ridge"
      alpha: 0.05

  # MLP模型
  mlp:
    input_dim: null  # 自动根据因子数量确定
    hidden_dims: [256, 128]
    dropout: 0.3
    learning_rate: 0.001
    batch_size: 4096
    epochs: 100
    early_stopping_patience: 10
    weight_decay: 0.0001

  # 模型保存路径
  save_dir: "models/saved"
