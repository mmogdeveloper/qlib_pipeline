# 因子配置
factor:
  # 基准因子集
  use_alpha158: true

  # 自定义因子
  custom_factors:
    momentum:
      - name: "mom_5d"
        expression: "$close/Ref($close,5)-1"
        description: "5日动量"
      - name: "mom_10d"
        expression: "$close/Ref($close,10)-1"
        description: "10日动量"
      - name: "mom_20d"
        expression: "$close/Ref($close,20)-1"
        description: "20日动量"
      - name: "mom_60d"
        expression: "$close/Ref($close,60)-1"
        description: "60日动量"

    volatility:
      - name: "vol_20d"
        expression: "Std($close/Ref($close,1)-1, 20)"
        description: "20日波动率"
      - name: "vol_5d"
        expression: "Std($close/Ref($close,1)-1, 5)"
        description: "5日波动率"

    turnover:
      - name: "turnover_5d_mean"
        expression: "Mean($turnover, 5)"
        description: "5日平均换手率"
      - name: "turnover_ratio"
        expression: "$turnover/Mean($turnover,20)"
        description: "换手率相对比"

    price_volume:
      - name: "corr_close_vol_20d"
        expression: "Corr($close, $turnover, 20)"
        description: "20日量价相关系数（用换手率替代成交量）"
      - name: "corr_close_vol_10d"
        expression: "Corr($close, $turnover, 10)"
        description: "10日量价相关系数（用换手率替代成交量）"

    liquidity:
      - name: "vwap_ratio"
        expression: "Mean($vwap, 10)"
        description: "10日均VWAP"

  # 动态因子过滤（训练前自动过滤弱因子和冗余因子）
  #
  # 工作流：
  #   1. 先运行 python analysis/factor_ic_analysis.py --include-alpha158-sample
  #   2. 训练时 get_custom_factor_expressions() 读取生成的 CSV 自动过滤
  #
  # 过滤规则（两道）：
  #   1. ICIR 阈值：|ICIR| < icir_min_abs 的因子直接丢弃
  #   2. 去重：IC 时序相关性 > corr_max 的因子对，保留 ICIR 绝对值更高的那个
  #      （同时去掉与 Alpha158 代表性因子高度重复的自定义因子）
  auto_filter:
    enabled: true
    ic_summary_path: "reports/factor_ic_summary.csv"   # factor_ic_analysis.py 的输出
    ic_series_path: "reports/factor_ic_series.csv"     # IC 时序，用于去重
    icir_min_abs: 0.1        # |ICIR| 低于此值直接丢弃（建议 0.1~0.2）
    corr_max: 0.90           # IC 时序相关系数超过此值视为冗余，保留 ICIR 更高的
    fallback_on_missing: true  # CSV 不存在时回退到全量因子（不报错，仅警告）

    # 第三道过滤：LightGBM feature importance（gain 口径）
    # 需要先完成一次训练，reports/feature_importance_lgbm.csv 存在后才生效
    # 与 ICIR 过滤互补：ICIR 衡量单因子预测力，gain 衡量模型实际使用程度
    feature_importance_filter:
      enabled: true
      importance_path: "reports/feature_importance_lgbm.csv"  # model_trainer 训练后自动生成
      min_gain_pct: 0.5   # 自定义因子 gain% 低于此阈值则移除（Alpha158 因子永远不删）
      fallback_on_missing: true  # CSV 不存在时跳过此道过滤，不报错

  # 因子预处理
  preprocessing:
    fillna:
      method: "ffill_then_median"  # 先前向填充，再截面中位数
    winsorize:
      method: "mad"
      n_sigma: 3
    normalize:
      method: "zscore"  # 截面Z-score标准化
    neutralize:
      enabled: false  # 行业中性化开关
      industry: "sw_level1"  # 申万一级行业
