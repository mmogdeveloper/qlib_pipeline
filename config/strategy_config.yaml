# 策略配置
strategy:
  # 选股策略
  type: "topk_dropout"  # topk / topk_dropout

  # TopK 参数
  topk: 20              # 每期持仓股票数
  n_drop: 1             # 每期最多换出股票数 (仅 topk_dropout, 降低换手率)

  # 组合权重
  # equal:          TopkDropout 等权 (默认)
  # score_weighted: 预测分数 softmax 加权
  # inv:            逆波动率加权 (推荐，稳健，无需调参)
  # rp:             风险平价 (等风险贡献)
  # gmv:            全局最小方差
  # mvo:            均值方差优化 (用预测分数作为期望收益)
  weighting: "equal"

  # 投资组合优化器参数 (weighting 为 inv/rp/gmv/mvo 时生效)
  optimizer_lookback: 60  # 计算协方差使用的历史天数

  # 调仓频率
  rebalance:
    frequency: "day"   # day / week / month
    weekday: 4          # 周五(0=周一, 4=周五)，仅 week 模式

  # A股交易规则
  trading_rules:
    # 涨跌停限制
    limit_up_filter: true    # 涨停不买入
    limit_up_threshold: 0.095        # 一字涨停判断阈值（开盘价/前收盘价 - 1）
    exchange_limit_threshold: 0.099  # 传入 exchange_kwargs 的涨跌停阈值
    limit_down_filter: true  # 跌停不卖出

    # ST股过滤（基于涨跌幅推断不可靠，误伤严重，默认关闭）
    # 已由 limit_up_filter / limit_down_filter 替代
    st_filter: false
    st_threshold: 0.055   # ST股涨跌幅阈值（近N日最大|涨跌幅|≤此值判为ST）
    st_window: 10         # ST判断滚动窗口天数
    st_min_periods: 5     # ST判断最小有效天数

    # 新股过滤
    ipo_filter:
      enabled: true
      days: 60  # 上市后60日内不交易

    # 停牌处理
    suspend_filter: true     # 停牌不交易

  # 交易成本
  cost:
    buy_commission: 0.0003     # 买入佣金 万3
    sell_commission: 0.0003    # 卖出佣金 万3
    stamp_tax: 0.001           # 印花税 千1（仅卖出）
    buy_slippage: 0.0002       # 买入滑点 万2
    sell_slippage: 0.0002      # 卖出滑点 万2
    # 汇总: open_cost=0.0005, close_cost=0.0015, min_cost=5

  # 初始资金
  initial_cash: 10000000  # 1000万
